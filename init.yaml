---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cozylex
  namespace: cozy-public
spec:
  interval: 1m0s
  ref:
    branch: master
  timeout: 60s
  url: https://github.com/lexfrei/cozylex.git
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cozylex
  namespace: cozy-system
spec:
  interval: 5m
  targetNamespace: cozy-system
  chart:
    spec:
      chart: ./packages/core/platform
      sourceRef:
        kind: GitRepository
        name: cozylex
        namespace: cozy-public
      version: '*'
