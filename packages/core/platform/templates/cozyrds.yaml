---
apiVersion: cozystack.io/v1alpha1
kind: CozystackResourceDefinition
metadata:
  name: minecraft-server
  namespace: cozy-system
spec:
  application:
    kind: MinecraftServer
    plural: minecraftservers
    singular: minecraft-server
    openAPISchema: |
      {
        "title": "Minecraft Server",
        "type": "object",
        "properties": {
          "updateStrategy": {
            "description": "Update strategy for Paper version.",
            "type": "string",
            "enum": ["latest", "auto", "pin", "build-pin"],
            "default": "latest"
          },
          "version": {
            "description": "Target Minecraft version (required for pin/build-pin).",
            "type": "string",
            "default": ""
          },
          "storageSize": {
            "description": "Persistent volume size for world data.",
            "type": "string",
            "default": "10Gi"
          },
          "storageClass": {
            "description": "Storage class for persistent volumes.",
            "type": "string",
            "default": ""
          },
          "memoryLimit": {
            "description": "Memory limit for the server container.",
            "type": "string",
            "default": "2Gi"
          },
          "cpuLimit": {
            "description": "CPU limit for the server container.",
            "type": "string",
            "default": "2"
          },
          "serviceType": {
            "description": "Service type (LoadBalancer, NodePort, ClusterIP).",
            "type": "string",
            "enum": ["LoadBalancer", "NodePort", "ClusterIP"],
            "default": "LoadBalancer"
          },
          "backupEnabled": {
            "description": "Enable VolumeSnapshot-based backups.",
            "type": "boolean",
            "default": false
          },
          "backupSchedule": {
            "description": "Cron schedule for periodic backups.",
            "type": "string",
            "default": "0 */6 * * *"
          },
          "backupRetention": {
            "description": "Maximum number of backup snapshots to keep.",
            "type": "integer",
            "default": 10
          },
          "checkCron": {
            "description": "Cron schedule for checking updates.",
            "type": "string",
            "default": "0 */4 * * *"
          }
        }
      }
  release:
    chart:
      name: ./packages/apps/minecraft-server
      sourceRef:
        kind: GitRepository
        name: cozylex
        namespace: cozy-public
    labels:
      cozystack.io/ui: "true"
    prefix: minecraft-
  dashboard:
    category: PaaS
    singular: Minecraft Server
    plural: Minecraft Servers
    description: Managed PaperMC Minecraft server with automatic updates and plugin management.
    tags:
      - gaming
      - minecraft
