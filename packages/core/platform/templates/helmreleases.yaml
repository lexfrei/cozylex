---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: minecraft-operator
  namespace: cozylex-minecraft-operator
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/lexfrei
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-operator
  namespace: cozylex-minecraft-operator
spec:
  interval: 5m
  releaseName: minecraft-operator
  targetNamespace: cozylex-minecraft-operator
  chart:
    spec:
      chart: minecraft-operator
      sourceRef:
        kind: HelmRepository
        name: minecraft-operator
      version: '>=1.0.0'
  values:
    crds:
      manage: true
